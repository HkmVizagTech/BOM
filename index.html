<!doctype html>
<html>
  <head>
    <title>Canteen Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="badge">Canteen</div>
        <h2>Ingredient Calculator</h2>
        <p>Day wise ingredient summary with per-head scaling.</p>
      </header>

      <section class="toolbar">
        <div class="controls">
          <label for="day">Select the Day</label>
          <select id="day"></select>

          <label for="pax">Enter the No Of People:</label>
          <input type="number" id="pax" value="1000" />
        </div>
        <button id="downloadExcel" class="btn-primary">
          Download as Excel
        </button>
      </section>

      <div id="output">Loading data...</div>
    </div>

    <!-- SheetJS for Excel export -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script src="app.js?v=4"></script>
  </body>
</html>
